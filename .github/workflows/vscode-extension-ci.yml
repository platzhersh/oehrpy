name: VS Code Extension CI

on:
  push:
    branches: [main, develop]
    paths:
      - "vscode-extension/**"
      - ".github/workflows/vscode-extension-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "vscode-extension/**"
      - ".github/workflows/vscode-extension-ci.yml"

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Package VSIX (smoke test)
        run: npx vsce package --no-dependencies -o oehrpy-validator.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: oehrpy-validator-vsix
          path: vscode-extension/oehrpy-validator.vsix
          if-no-files-found: error
